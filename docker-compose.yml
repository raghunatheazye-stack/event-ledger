services:
  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    ports: ["8081:8081"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
  event-gateway:
    build:
      context: .
      dockerfile: event-gateway/Dockerfile
    ports: ["8080:8080"]
    environment:
      ACCOUNT_SERVICE_BASE_URL: http://account-service:8081
    depends_on:
      account-service:
        condition: service_healthy
